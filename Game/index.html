<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Online</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
}

#menu {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 15px;
  background: linear-gradient(#1a1a1a, #000);
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  cursor: pointer;
  border-radius: 10px;
}

#game {
  display: none;
}
</style>
</head>

<body>

<div id="menu">
  <h1>⚽ Football Online</h1>
  <button onclick="play()">Jouer en ligne</button>
  <button onclick="alert('À venir')">Créer salle</button>
  <button onclick="alert('À venir')">Rejoindre salle</button>
</div>

<div id="game"></div>

<script>
function play() {
  document.getElementById("menu").style.display = "none";
  document.getElementById("game").style.display = "block";
  startGame();
}
</script>

<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

function startGame(){

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById("game").appendChild(renderer.domElement);

// field
const field = new THREE.Mesh(
new THREE.PlaneGeometry(60,40),
new THREE.MeshStandardMaterial({color:0x2ecc71})
);
field.rotation.x = -Math.PI/2;
scene.add(field);

// player (TEMP sphere)
const player = new THREE.Mesh(
new THREE.SphereGeometry(1),
new THREE.MeshStandardMaterial({color:0xff0000})
);
player.position.y = 1;
scene.add(player);

// light
const light = new THREE.DirectionalLight(0xffffff, 2);
light.position.set(10,20,10);
scene.add(light);

// camera
camera.position.set(0,15,15);
camera.lookAt(0,0,0);

// movement
const keys = {};
document.addEventListener("keydown",(e)=>keys[e.key.toLowerCase()]=true);
document.addEventListener("keyup",(e)=>keys[e.key.toLowerCase()]=false);

function animate(){
  requestAnimationFrame(animate);

  if(keys["z"]) player.position.z -= 0.2;
  if(keys["s"]) player.position.z += 0.2;
  if(keys["q"]) player.position.x -= 0.2;
  if(keys["d"]) player.position.x += 0.2;

  renderer.render(scene,camera);
}

animate();

}

</script>

</body>
</html>
